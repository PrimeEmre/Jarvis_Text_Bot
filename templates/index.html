<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Speech Interface</title>
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>

    <div class="app-card">
        <header>
            <h1>Text to Speech</h1>
            <p>Convert your text into natural-sounding audio</p>
        </header>

        <main>
            <textarea id="text-input" placeholder="Enter your text here..."></textarea>
            
            <div class="settings-grid">
                <div class="control">
                    <label for="voice-select">Voice Engine</label>
                    <select id="voice-select">
                        </select>
                </div>
                
                <div class="control">
                    <label for="rate">Playback Speed</label>
                    <div class="slider-container">
                        <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
                        <span id="rate-value">1.0x</span>
                    </div>
                </div>
            </div>

            <button id="action-btn" class="btn-primary">
                <span class="btn-text">Synthesize Speech</span>
            </button>
        </main>
    </div>

    <script src="/static/sript.js"></script>
</body>
</html>
